<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
}

/* HERO */

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:42px;
font-weight:700;
letter-spacing:1px;
background:linear-gradient(90deg,#00ffe7,#00b3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:15px;
opacity:.8;
max-width:500px;
}

/* TOOL CARD */

.tool{
max-width:900px;
margin:-80px auto 40px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(25px);
box-shadow:0 20px 60px rgba(0,0,0,.4);
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

@media(max-width:768px){
.tool{grid-template-columns:1fr}
.hero h1{font-size:30px}
}

.left img{
width:100%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.right h2{
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:600;
cursor:pointer;
background:linear-gradient(45deg,#00ffe7,#00b3ff);
color:black;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffe7;
}

.result{
margin-top:15px;
line-height:1.7;
}

.count{
font-size:20px;
margin-top:10px;
color:#00ffe7;
font-weight:600;
}

footer{
text-align:center;
opacity:.6;
padding:20px;
}

</style>
</head>

<body>

<section class="hero">
<h1>Know Your Exact Age</h1>
<p>Advanced real-time age calculator with birthday countdown and life statistics.</p>
</section>

<section class="tool">

<div class="left">
<img src="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?q=80&w=800">
</div>

<div class="right">

<h2>Calculate Your Age</h2>

<input type="date" id="dob">

<button onclick="startCalc()">Calculate Now</button>

<div class="result" id="res"></div>
<div class="count" id="count"></div>

</div>

</section>

<footer>
© Age Calculator Pro
</footer>

<script>

let timer;

function startCalc(){

clearInterval(timer);

let dob=new Date(document.getElementById("dob").value);
if(!dob.getTime()){alert("Enter valid DOB");return;}

let now=new Date();
let diff=now-dob;

let days=Math.floor(diff/86400000);
let years=Math.floor(days/365.25);
let months=Math.floor(days/30.44);
let weeks=Math.floor(days/7);

let weekday=dob.toLocaleString('default',{weekday:'long'});

document.getElementById("res").innerHTML=
`
<b>Exact Age:</b> ${years} Years<br>
<b>Months:</b> ${months}<br>
<b>Weeks:</b> ${weeks}<br>
<b>Days Lived:</b> ${days}<br>
<b>Born On:</b> ${weekday}
`;

let next=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
if(next<now) next.setFullYear(now.getFullYear()+1);

timer=setInterval(()=>{

let n=new Date();
let diff=next-n;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("count").innerHTML=
`🎂 Next Birthday Countdown: ${d}D ${h}H ${m}M ${s}S`;

},1000);

}

</script>

</body>
</html>
