<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Countdown Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:radial-gradient(circle at 20% 20%,#00eaff22,transparent),
#070b15;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* heading */

h1{
font-size:58px;
font-weight:900;
background:linear-gradient(90deg,#fff,#7dd3fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

/* card */

.card{
margin-top:30px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
width:90%;
max-width:440px;
text-align:center;
box-shadow:0 30px 60px #000;
}

/* date input */

input{
width:100%;
padding:18px;
border-radius:14px;
border:none;
margin-top:20px;
font-size:18px;
text-align:center;
letter-spacing:2px;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
margin-top:15px;
font-weight:600;
background:linear-gradient(90deg,#00ffe7,#38bdf8);
cursor:pointer;
}

/* error */

.error{
color:#ff6b6b;
margin-top:10px;
}

/* countdown */

.countWrap{
margin-top:40px;
display:none;
flex-direction:column;
align-items:center;
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(4,100px);
gap:20px;
justify-content:center;
margin-top:20px;
}

.box{
background:#020617;
padding:20px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 35px #000;
}

.num{
font-size:40px;
font-weight:800;
}

.lab{
font-size:12px;
opacity:.6;
}

/* stats */

.stats{
margin-top:25px;
opacity:.8;
}

/* sparkle */

.spark{
position:absolute;
width:6px;
height:6px;
background:#00ffe7;
border-radius:50%;
animation:spark 1.2s forwards;
}

@keyframes spark{
to{
transform:translateY(-120px) scale(0);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Discover Your Time</h1>

<div class="card">

<label>Enter Birth Date (DD-MM-YYYY)</label>
<input type="date" id="dob" min="1900-01-01" max="2030-01-01">

<button id="btn">Reveal Countdown</button>

<div class="error" id="err"></div>

</div>

<div class="countWrap" id="countWrap">

<h2>Next Birthday Countdown 🥳</h2>

<div class="grid">

<div class="box"><div class="num" id="d">00</div><div class="lab">DAYS</div></div>
<div class="box"><div class="num" id="h">00</div><div class="lab">HOURS</div></div>
<div class="box"><div class="num" id="m">00</div><div class="lab">MIN</div></div>
<div class="box"><div class="num" id="s">00</div><div class="lab">SEC</div></div>

</div>

<div class="stats" id="stats"></div>

</div>

<script>

let timer;

document.getElementById("dob").addEventListener("keydown",e=>{
if(e.key==="Enter") start();
});

document.getElementById("btn").onclick=start;

function start(){

let val=document.getElementById("dob").value;
let err=document.getElementById("err");

if(!val){
err.innerHTML="⚠️ Please select date of birth";
return;
}

let dob=new Date(val);

if(dob.getFullYear()<1900 || dob.getFullYear()>2030){
err.innerHTML="⚠️ Year must be between 1900 and 2030";
return;
}

err.innerHTML="";

/* reveal animation */

document.getElementById("countWrap").style.display="flex";

for(let i=0;i<40;i++){
let sp=document.createElement("div");
sp.className="spark";
sp.style.left=(window.innerWidth/2+Math.random()*300-150)+"px";
sp.style.top=(window.innerHeight/2)+"px";
document.body.appendChild(sp);
setTimeout(()=>sp.remove(),1200);
}

/* lived stats */

let now=new Date();
let lived=Math.floor((now-dob)/86400000);
let hours=Math.floor((now-dob)/3600000);

document.getElementById("stats").innerHTML=
`You have lived approx <b>${lived}</b> days / <b>${hours}</b> hours`;

runCountdown(dob);

}

function runCountdown(dob){

clearInterval(timer);

timer=setInterval(()=>{

let now=new Date();

let next=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
if(next<now) next.setFullYear(now.getFullYear()+1);

let diff=next-now;

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("d").innerHTML=d;
document.getElementById("h").innerHTML=h;
document.getElementById("m").innerHTML=m;
document.getElementById("s").innerHTML=s;

},1000);

}

</script>

</body>
</html>
