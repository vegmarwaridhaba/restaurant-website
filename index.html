<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgeTool</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:"Plus Jakarta Sans",sans-serif}

body{
background:
radial-gradient(circle at 20% 30%,#5eead433,transparent),
radial-gradient(circle at 80% 70%,#60a5fa33,transparent),
#050816;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
overflow:hidden;
}

/* ambient floating lights */

body::before,body::after{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(140px);
opacity:.5;
animation:float 18s infinite alternate;
}

body::before{background:#22d3ee;top:-150px;left:-150px}
body::after{background:#6366f1;bottom:-150px;right:-150px}

@keyframes float{
to{transform:translateY(60px) translateX(40px)}
}

/* main container */

.app{
width:100%;
max-width:920px;
padding:50px;
border-radius:32px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(30px) saturate(140%);
box-shadow:0 40px 100px rgba(0,0,0,.7);
text-align:center;
}

/* hero */

h1{
font-size:clamp(36px,5vw,64px);
font-weight:800;
letter-spacing:-1px;
background:linear-gradient(90deg,#fff,#7dd3fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:10px;
opacity:.65;
}

/* form */

.form{
margin-top:40px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

input{
padding:18px 20px;
border-radius:14px;
border:none;
font-size:16px;
background:#ffffffee;
min-width:220px;
}

button{
padding:18px 26px;
border-radius:14px;
border:none;
font-weight:600;
background:linear-gradient(90deg,#22d3ee,#60a5fa);
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 15px 35px #22d3ee44;
}

/* loader */

.loader{
margin-top:30px;
display:none;
opacity:.7;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
50%{opacity:.2}
}

/* countdown */

.count{
margin-top:40px;
display:none;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.box{
width:120px;
height:130px;
border-radius:20px;
background:linear-gradient(180deg,#0f172a,#020617);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 20px 40px #000;
}

.num{
font-size:46px;
font-weight:700;
}

.lab{
font-size:12px;
opacity:.6;
margin-top:6px;
}

@media(max-width:600px){
.app{padding:30px}
.box{width:80px;height:100px}
.num{font-size:30px}
}

</style>
</head>

<body>

<div class="app">

<h1>Know Your Time</h1>
<div class="sub">Real-time birthday countdown experience</div>

<div class="form">
<input type="date" id="dob" min="1900-01-01" max="2030-01-01">
<button onclick="start()">Reveal</button>
</div>

<div class="loader" id="loader">Calculating timeline…</div>

<div class="count" id="count">

<div class="box"><div class="num" id="d">00</div><div class="lab">DAYS</div></div>
<div class="box"><div class="num" id="h">00</div><div class="lab">HOURS</div></div>
<div class="box"><div class="num" id="m">00</div><div class="lab">MIN</div></div>
<div class="box"><div class="num" id="s">00</div><div class="lab">SEC</div></div>

</div>

</div>

<script>

let timer;

function start(){

let val=dob.value;
if(!val){
alert("Enter birth date");
return;
}

loader.style.display="block";
count.style.display="none";

setTimeout(()=>{

loader.style.display="none";
count.style.display="flex";

run(new Date(val));

},1200);

}

function run(dobDate){

clearInterval(timer);

timer=setInterval(()=>{

let now=new Date();

let next=new Date(now.getFullYear(),dobDate.getMonth(),dobDate.getDate());
if(next<now) next.setFullYear(now.getFullYear()+1);

let diff=next-now;

d.innerHTML=Math.floor(diff/86400000);
h.innerHTML=Math.floor(diff/3600000)%24;
m.innerHTML=Math.floor(diff/60000)%60;
s.innerHTML=Math.floor(diff/1000)%60;

},1000);

}

</script>

</body>
</html>
