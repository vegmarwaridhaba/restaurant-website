<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
background-size:400% 400%;
animation:bgmove 12s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:95%;
max-width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(0,0,0,.4);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
letter-spacing:1px;
text-shadow:0 0 15px #00ffcc;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
outline:none;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(45deg,#00ffcc,#00c3ff);
color:black;
transition:.3s;
box-shadow:0 0 15px #00ffcc;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00ffcc;
}

.result{
margin-top:20px;
text-align:left;
line-height:1.6;
font-size:14px;
}

hr{
border:.5px solid rgba(255,255,255,.3);
margin:10px 0;
}

.glow{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #00ffcc}
to{text-shadow:0 0 20px #00ffcc}
}

</style>
</head>

<body>

<div class="card">
<h1 class="glow">Age Calculator</h1>

<input type="date" id="dob">

<button onclick="calc()">Calculate Age</button>
<button onclick="dark()">Toggle Dark</button>

<div class="result" id="res"></div>

</div>

<script>

function calc(){

let dob=new Date(document.getElementById("dob").value);
let now=new Date();

if(!dob.getTime()){
alert("Enter valid DOB");
return;
}

let diff=now-dob;

let days=Math.floor(diff/86400000);
let years=Math.floor(days/365.25);
let months=Math.floor(days/30.44);
let weeks=Math.floor(days/7);
let hours=Math.floor(diff/3600000);

let weekday=dob.toLocaleString('default',{weekday:'long'});

let next=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
if(next<now) next.setFullYear(now.getFullYear()+1);

let bdiff=next-now;
let bdays=Math.floor(bdiff/86400000);

document.getElementById("res").innerHTML=

`
<b>Exact Age:</b> ${years} years<br>
<b>Months:</b> ${months}<br>
<b>Weeks:</b> ${weeks}<br>
<b>Days lived:</b> ${days}<br>
<b>Hours lived:</b> ${hours}<br>

<hr>

<b>Born on:</b> ${weekday}<br>
<b>Next Birthday:</b> ${bdays} days 🎂

`;

}

function dark(){
document.body.style.filter=
document.body.style.filter=="invert(1)" ? "invert(0)" : "invert(1)";
}

</script>

</body>
</html>
