<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Engine 2.0 | ToolsZy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-cyan: #00eaff;
            --neon-purple: #7c3aed;
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
        }

        *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark-bg); color: white; min-height: 100vh; overflow-x: hidden; background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #020617 80%); }

        /* HEADER & SIDEBAR (ToolsZy Standard) */
        header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.25); backdrop-filter: blur(12px); z-index: 999; }
        .menu-btn { position: absolute; left: 20px; font-size: 28px; cursor: pointer; transition: .4s; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 22px; }
        .circle { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: #020617; padding: 90px 25px; transition: .45s; z-index: 998; border-right: 1px solid rgba(0, 234, 255, 0.1); }
        .sidebar.open { left: 0; }
        .sidebar a { display: block; margin: 18px 0; opacity: .7; text-decoration: none; color: white; transition: .3s; }
        .sidebar a:hover { opacity: 1; color: var(--neon-cyan); padding-left: 10px; }

        /* WRAPPER BLUR */
        .wrap.blur { filter: blur(15px); pointer-events: none; }
        .wrap { padding: 120px 20px 60px; max-width: 1200px; margin: 0 auto; transition: 0.5s ease; text-align: center; }

        /* CALCULATOR CARD */
        .calc-card { max-width: 500px; margin: 0 auto; background: var(--glass); backdrop-filter: blur(25px); border-radius: 35px; padding: 40px; border: 1px solid rgba(0, 234, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }

        .input-box { margin-bottom: 25px; text-align: left; }
        .input-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; }
        
        /* EDITABLE INPUTS */
        .edit-val { background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 234, 255, 0.2); color: var(--neon-cyan); font-weight: 700; padding: 5px 12px; border-radius: 8px; width: 110px; text-align: right; outline: none; transition: .3s; }
        .edit-val:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 234, 255, 0.2); }

        input[type=range] { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; outline: none; appearance: none; margin-top: 10px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: white; border: 4px solid var(--neon-cyan); border-radius: 50%; cursor: pointer; transition: 0.3s; }

        /* LOADER ANIMATION */
        .loading-wrap { display: none; margin: 20px 0; }
        .spinner { width: 35px; height: 35px; border: 4px solid rgba(0,234,255,0.1); border-top: 4px solid var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BUTTONS */
        .calc-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); color: white; font-weight: 700; cursor: pointer; transition: 0.4s; margin-top: 10px; }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 234, 255, 0.3); }

        /* BUY ME A COFFEE (Premium Coffee Button) */
        .coffee-btn { display: inline-flex; align-items: center; gap: 10px; margin-top: 40px; background: #FFDD00; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 700; text-decoration: none; transition: 0.4s; box-shadow: 0 10px 20px rgba(255, 221, 0, 0.2); }
        .coffee-btn:hover { transform: scale(1.05) rotate(-2deg); background: #fff; }

        /* SOCIAL FILL/UNFILL (Exactly as requested) */
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .s-link { position: relative; width: 60px; height: 60px; background: #1e293b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; overflow: hidden; transition: 0.4s ease; text-decoration: none; }
        .s-link::before { content: ""; position: absolute; bottom: -100%; left: 0; width: 100%; height: 100%; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .s-link i { position: relative; z-index: 2; }
        .s-link:hover { transform: translateY(-10px); }
        .s-link:hover::before { bottom: 0; }
        .insta:hover::before { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .x-twitter:hover::before { background: #000; }
        .tele:hover::before { background: #0088cc; }

        /* THE LINE BAR (Single Animated Line) */
        .line-bar { width: 100%; height: 10px; background: var(--neon-purple); border-radius: 10px; margin: 25px 0; overflow: hidden; display: none; }
        #fill-bar { height: 100%; width: 0%; background: var(--neon-cyan); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 2px 0 10px var(--neon-cyan); }
    </style>
</head>
<body>
    <header>
        <div class="menu-btn" id="mBtn">☰</div>
        <div class="logo"><div class="circle">TZ</div>ToolsZy</div>
    </header>

    <div class="sidebar" id="sBar">
        <a href="#">Home</a>
        <a href="#" style="color:var(--neon-cyan)">EMI Calculator</a>
        <a href="#">Buy Me a Coffee</a>
    </div>

    <div class="wrap" id="wrap">
        <h1>EMI Engine <span style="font-size: 18px; color: var(--neon-cyan);">2.0</span></h1>
        <p style="opacity:0.4; letter-spacing: 2px; font-size: 10px; margin-bottom: 30px;">PRECISE FINANCIAL ANALYTICS</p>

        <div class="calc-card">
            <div class="input-box">
                <div class="input-header">
                    <span class="label">Principal Amount (₹)</span>
                    <input type="number" id="la_val" class="edit-val" value="500000" oninput="sync('la_v')">
                </div>
                <input type="range" id="la" min="100" max="10000000" step="100" value="500000" oninput="sync('la_r')">
            </div>

            <div class="input-box">
                <div class="input-header">
                    <span class="label">Interest Rate (%)</span>
                    <input type="number" id="ir_val" class="edit-val" value="8.5" step="0.01" oninput="sync('ir_v')">
                </div>
                <input type="range" id="ir" min="0.1" max="45" step="0.1" value="8.5" oninput="sync('ir_r')">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-box">
                    <div class="input-header"><span class="label">Years</span></div>
                    <input type="number" id="yr_val" class="edit-val" style="width:100%" value="5" oninput="sync('yr_v')">
                    <input type="range" id="yr" min="0" max="40" value="5" oninput="sync('yr_r')">
                </div>
                <div class="input-box">
                    <div class="input-header"><span class="label">Months</span></div>
                    <input type="number" id="mo_val" class="edit-val" style="width:100%" value="0" oninput="sync('mo_v')">
                    <input type="range" id="mo" min="0" max="11" value="0" oninput="sync('mo_r')">
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">Analyze Loan</button>

            <div class="loading-wrap" id="loader"><div class="spinner"></div></div>

            <div id="res-box" style="display:none; margin-top: 30px; animation: fadeInUp 0.5s ease;">
                <span class="label">Monthly Installment</span>
                <h2 id="emi_res" style="font-size: 38px; color: #fff; margin-bottom: 10px;">₹0</h2>
                
                <div class="line-bar" id="line-bar"><div id="fill-bar"></div></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;">
                        <span class="label" style="font-size: 9px;">Total Interest</span>
                        <p id="int_res" style="font-weight: 700;">₹0</p>
                    </div>
                    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;">
                        <span class="label" style="font-size: 9px;">Total Payable</span>
                        <p id="tot_res" style="font-weight: 700;">₹0</p>
                    </div>
                </div>
            </div>
        </div>

        <a href="#" class="coffee-btn"><i class="fas fa-coffee"></i> Buy me a coffee</a>

        <div class="social-links">
            <a href="#" class="s-link insta"><i class="fab fa-instagram"></i></a>
            <a href="#" class="s-link x-twitter"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" class="s-link tele"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <script>
        const mBtn = document.getElementById('mBtn');
        const sBar = document.getElementById('sBar');
        const wrap = document.getElementById('wrap');

        mBtn.onclick = () => { sBar.classList.toggle('open'); wrap.classList.toggle('blur'); mBtn.innerText = sBar.classList.contains('open') ? '✕' : '☰'; }
        wrap.onclick = () => { sBar.classList.remove('open'); wrap.classList.remove('blur'); mBtn.innerText = '☰'; }

        // SYNC LOGIC FOR EDITABLE INPUTS
        function sync(type) {
            const ids = ['la', 'ir', 'yr', 'mo'];
            ids.forEach(id => {
                if(type === id+'_v') document.getElementById(id).value = document.getElementById(id+'_val').value;
                if(type === id+'_r') document.getElementById(id+'_val').value = document.getElementById(id).value;
            });
        }

        function calculate() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('res-box').style.display = 'none';

            setTimeout(() => {
                const P = parseFloat(document.getElementById('la_val').value) || 0;
                const R = (parseFloat(document.getElementById('ir_val').value) / 12) / 100;
                const N = (parseInt(document.getElementById('yr_val').value) * 12) + (parseInt(document.getElementById('mo_val').value) || 0);

                if(P > 0 && R > 0 && N > 0) {
                    const emi = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);
                    const total = emi * N;
                    const interest = total - P;

                    document.getElementById('emi_res').innerText = "₹" + emi.toLocaleString('en-IN', {maximumFractionDigits: 2});
                    document.getElementById('int_res').innerText = "₹" + interest.toLocaleString('en-IN', {maximumFractionDigits: 2});
                    document.getElementById('tot_res').innerText = "₹" + total.toLocaleString('en-IN', {maximumFractionDigits: 2});

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('res-box').style.display = 'block';
                    document.getElementById('line-bar').style.display = 'block';

                    setTimeout(() => {
                        document.getElementById('fill-bar').style.width = (P / total * 100) + "%";
                    }, 100);
                } else {
                    alert("Please enter valid loan details.");
                    document.getElementById('loader').style.display = 'none';
                }
            }, 700);
        }
    </script>
</body>
</html>
