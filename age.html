<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#050816;color:white;font-family:sans-serif;text-align:center;padding:40px}
input,button{padding:12px;margin:10px;border-radius:8px;border:none}
</style>
</head>

<body>

<h1>Age Calculator</h1>

<input type="date" id="dob">
<br>
<button onclick="calc()">Calculate</button>

<h2 id="res"></h2>

<script>
function calc(){
let dob=new Date(document.getElementById("dob").value);
let now=new Date();
let diff=now-dob;
let days=Math.floor(diff/86400000);
let years=Math.floor(days/365);
res.innerHTML=years+" Years ("+days+" days)";
}
</script>

</body>
</html>
